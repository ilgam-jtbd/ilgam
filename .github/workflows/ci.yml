name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: Lint · Typecheck · Test (affected)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.sha }}
          restore-keys: |
            turbo-

      - run: pnpm turbo run lint typecheck test --filter=...[origin/main]

  db-rls-tests:
    name: pgTAP RLS tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    services:
      postgres:
        image: supabase/postgres:15.1.1.78
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install pg_prove
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libtap-parser-sourcehandler-pgtap-perl postgresql-client
      - name: Enable pgTAP extension
        run: |
          psql postgresql://postgres:postgres@localhost:5432/postgres \
            -c "CREATE EXTENSION IF NOT EXISTS pgtap;"
      - name: Apply migrations
        run: |
          for f in packages/db/migrations/*.sql; do
            psql postgresql://postgres:postgres@localhost:5432/postgres -f "$f"
          done
      - name: Run pgTAP
        run: pg_prove -d postgresql://postgres:postgres@localhost:5432/postgres packages/db/tests/*.sql

  # 신규 advisory job — 머지 차단하지 않음 (continue-on-error). 자격증명 도착 후 required gate로 승격.
  edge-deno-check:
    name: Edge Functions · Deno check (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: deno lint (no remote imports)
        run: |
          if compgen -G "supabase/functions/*/index.ts" > /dev/null; then
            deno lint supabase/functions || true
          else
            echo "no edge functions · skipping"
          fi

  # advisory — worker-app 변경 시만, prebuild 실패해도 머지 차단하지 않음
  expo-prebuild-check:
    name: Expo prebuild dry-run (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile
      - name: Determine if worker-app affected
        id: affected
        run: |
          if pnpm turbo run typecheck --filter=...[origin/main] --dry-run=json 2>/dev/null | grep -q '@ilgam/worker-app'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Expo doctor
        if: steps.affected.outputs.changed == 'true'
        working-directory: apps/worker-app
        run: npx expo-doctor || true
      - name: Expo prebuild (android only · dry)
        if: steps.affected.outputs.changed == 'true'
        working-directory: apps/worker-app
        run: npx expo prebuild --no-install --platform android --clean || true
